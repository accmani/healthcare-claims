# =============================================================================
# Healthcare Claims Adjudication System - Application Configuration
# =============================================================================

# Server Configuration
server.port=8080
server.servlet.context-path=/

# =============================================================================
# H2 In-Memory Database Configuration
# =============================================================================
spring.datasource.url=jdbc:h2:mem:claimsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# H2 Console - accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================================================
# JPA / Hibernate Configuration
# =============================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# =============================================================================
# SpringDoc / Swagger UI Configuration
# =============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false

# API documentation metadata
springdoc.info.title=Healthcare Claims Adjudication API
springdoc.info.description=Enterprise Healthcare Claims Processing and Adjudication System
springdoc.info.version=1.0.0
springdoc.info.contact.name=Enterprise Health IT
springdoc.info.contact.email=healthit@enterprise.com

# =============================================================================
# Logging Configuration
# =============================================================================
logging.level.com.enterprise.healthcare=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# =============================================================================
# Jackson / JSON Configuration
# =============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
